name: AVASAM Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک‌های دانلود (برای حالت site فقط یک لینک)'
        required: true
        type: string
      mode:
        description: 'حالت دانلود'
        required: true
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
          - site
      password:
        description: 'رمز فایل زیپ (اختیاری)'
        required: false
        default: ''
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y aria2 zip curl bc wget

      - name: Download and process
        env:
          MODE: ${{ github.event.inputs.mode }}
          URLS: ${{ github.event.inputs.urls }}
          ZIP_PASSWORD: ${{ github.event.inputs.password }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BRANCH: ${{ github.ref_name }}
          SPLIT_MB: 45
        run: |
          set +e # موقتاً خروج بر اساس خطا را غیرفعال می‌کنیم تا wget بتواند خطا برگرداند
          # ---------- helper functions ----------
          urlencode() { python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))" "$1"; }
          random_name() { echo "${RANDOM}_$(date +%s)"; }

          backup_dir="/tmp/dl_backup"
          mkdir -p "$backup_dir" downloads tmp_downloads
          split_bytes=$((SPLIT_MB * 1024 * 1024))

          # ---------- site mode ----------
          if [ "$MODE" = "site" ]; then
            site_url=$(echo "$URLS" | awk '{print $1}')
            host=$(echo "$site_url" | awk -F/ '{print $3}')
            folder=$(random_name)
            mkdir -p "$backup_dir/$folder"
            echo "Mirroring: $site_url"
            wget \
              --mirror \
              --page-requisites \
              --convert-links \
              --adjust-extension \
              --no-parent \
              --restrict-file-names=windows \
              --wait=1 \
              --random-wait \
              --tries=3 \
              --no-check-certificate \
              --delete-after \
              --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              -P /tmp/site_temp \
              "$site_url"
            
            # ثبت کد خروج wget برای بررسی
            wget_exit_code=$?
            if [ $wget_exit_code -eq 8 ]; then
              echo "WARNING: wget finished with exit code 8 (some resources returned errors like 404). This is often minor. Continuing..."
            elif [ $wget_exit_code -ne 0 ]; then
              echo "ERROR: wget encountered a critical error (exit code $wget_exit_code). Exiting."
              exit 1
            fi

            # find downloaded directory
            site_dir=$(find /tmp/site_temp -maxdepth 1 -type d ! -name "site_temp" -print -quit)
            if [ -z "$site_dir" ]; then
              echo "ERROR: Download failed, no directory found. Exiting."
              exit 1
            fi
            archive_path="$backup_dir/$folder/$host.zip"
            if [ -n "$ZIP_PASSWORD" ]; then
              zip -r -P "$ZIP_PASSWORD" -s ${SPLIT_MB}m "$archive_path" "$site_dir"
            else
              zip -r -s ${SPLIT_MB}m "$archive_path" "$site_dir"
            fi
            # create README
            size_mb=$(du -sm "$backup_dir/$folder" | cut -f1)
            parts=$(ls "$backup_dir/$folder"/*.z* "$backup_dir/$folder"/*.zip 2>/dev/null | wc -l)
            {
              echo "# Site Mirror"
              echo "| Property | Value |"
              echo "|----------|-------|"
              echo "| URL | $site_url |"
              echo "| Size | ${size_mb} MB |"
              echo "| Parts | $parts |"
            } > "$backup_dir/$folder/README.md"
            rm -rf /tmp/site_temp
          else
            # ---------- normal / zip mode ----------
            # (اینجا کد مربوط به حالت normal و zip بدون تغییر می‌ماند)
            # ...
          fi

          # ---------- copy to downloads/ ----------
          cp -r "$backup_dir"/* downloads/ 2>/dev/null || true

          # ---------- generate downloads/README.md ----------
          {
            echo "# Downloaded list"
            for d in downloads/*/; do
              [ -d "$d" ] || continue
              dn=$(basename "$d")
              de=$(urlencode "$dn")
              echo "- [$dn](./$de)"
            done
          } > downloads/README.md

          # ---------- update root README.md (append section) ----------
          section="فایل‌های دانلود شده"
          if [ -f README.md ]; then
            sed -i "/$section/,/^---/d" README.md
          fi
          {
            echo ""
            echo "---"
            echo "## $section"
            echo ""
            repo_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/tree/${BRANCH}/downloads"
            for d in downloads/*/; do
              [ -d "$d" ] || continue
              dn=$(basename "$d")
              de=$(urlencode "$dn")
              echo "- [$dn]($repo_url/$de)"
            done
            echo "---"
          } >> README.md

      - name: Commit and push
        run: |
          # ... (باقی مراحل commit و push بدون تغییر)
