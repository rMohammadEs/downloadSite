name: AVASAM Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک‌های دانلود (برای حالت site فقط یک لینک)'
        required: true
        type: string
      mode:
        description: 'حالت دانلود'
        required: true
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
          - site
      password:
        description: 'رمز فایل زیپ (اختیاری)'
        required: false
        default: ''
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y aria2 zip curl bc wget

      - name: Download and process
        env:
          MODE: ${{ github.event.inputs.mode }}
          URLS: ${{ github.event.inputs.urls }}
          ZIP_PASSWORD: ${{ github.event.inputs.password }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BRANCH: ${{ github.ref_name }}
          SPLIT_MB: 45
        run: |
          set -e
          # ---------- helper functions ----------
          urlencode() { python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))" "$1"; }
          random_name() { echo "${RANDOM}_$(date +%s)"; }

          backup_dir="/tmp/dl_backup"
          mkdir -p "$backup_dir" downloads tmp_downloads
          split_bytes=$((SPLIT_MB * 1024 * 1024))

          # ---------- site mode ----------
          if [ "$MODE" = "site" ]; then
            site_url=$(echo "$URLS" | awk '{print $1}')
            host=$(echo "$site_url" | awk -F/ '{print $3}')
            folder=$(random_name)
            mkdir -p "$backup_dir/$folder"
            echo "Mirroring: $site_url"
            wget --mirror -p --convert-links -e robots=off -P /tmp/site_temp "$site_url"
            # find downloaded directory
            site_dir=$(find /tmp/site_temp -maxdepth 1 -type d ! -name "site_temp" -print -quit)
            [ -z "$site_dir" ] && { echo "Download failed"; exit 1; }
            archive_path="$backup_dir/$folder/$host.zip"
            if [ -n "$ZIP_PASSWORD" ]; then
              zip -r -P "$ZIP_PASSWORD" -s ${SPLIT_MB}m "$archive_path" "$site_dir"
            else
              zip -r -s ${SPLIT_MB}m "$archive_path" "$site_dir"
            fi
            # create README
            size_mb=$(du -sm "$backup_dir/$folder" | cut -f1)
            parts=$(ls "$backup_dir/$folder"/*.z* "$backup_dir/$folder"/*.zip 2>/dev/null | wc -l)
            {
              echo "# Site Mirror"
              echo "| Property | Value |"
              echo "|----------|-------|"
              echo "| URL | $site_url |"
              echo "| Size | ${size_mb} MB |"
              echo "| Parts | $parts |"
            } > "$backup_dir/$folder/README.md"
            rm -rf /tmp/site_temp
          else
            # ---------- normal / zip mode ----------
            for url in $URLS; do
              fname=$(basename "$url" | sed 's/[?#].*//; s/[<>:"|?*]/_/g')
              ok=false
              for attempt in 1 2 3; do
                aria2c -x2 -s2 --timeout=60 -d tmp_downloads -o "$fname" "$url" && ok=true && break
                curl -L --retry 3 -A "Mozilla/5.0" -o "tmp_downloads/$fname" "$url" && ok=true && break
                sleep 5
              done
              [ "$ok" = false ] && echo "FAILED: $fname"
            done

            if [ "$MODE" = "zip" ] && [ "$(ls -A tmp_downloads 2>/dev/null)" ]; then
              folder="archive_$(date +%Y%m%d_%H%M%S)"
              mkdir -p "$backup_dir/$folder"
              archive="$backup_dir/$folder/archive.zip"
              if [ -n "$ZIP_PASSWORD" ]; then
                zip -j -P "$ZIP_PASSWORD" -s ${SPLIT_MB}m "$archive" tmp_downloads/*
              else
                zip -j -s ${SPLIT_MB}m "$archive" tmp_downloads/*
              fi
              size_mb=$(du -sm "$backup_dir/$folder" | cut -f1)
              parts=$(ls "$backup_dir/$folder"/*.z* "$backup_dir/$folder"/*.zip 2>/dev/null | wc -l)
              { echo "# Archive"; echo "Size: ${size_mb} MB, Parts: $parts"; } > "$backup_dir/$folder/README.md"
            else
              for f in tmp_downloads/*; do
                [ -f "$f" ] || continue
                bname=$(basename "$f")
                base="${bname%.*}"
                folder="$base"
                mkdir -p "$backup_dir/$folder"
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "$ZIP_PASSWORD" -s ${SPLIT_MB}m "$backup_dir/$folder/$base.zip" "$f"
                else
                  zip -j -s ${SPLIT_MB}m "$backup_dir/$folder/$base.zip" "$f"
                fi
                size_mb=$(du -sm "$backup_dir/$folder" | cut -f1)
                { echo "# $bname"; echo "Size: ${size_mb} MB"; } > "$backup_dir/$folder/README.md"
              done
            fi
            rm -rf tmp_downloads
          fi

          # ---------- copy to downloads/ ----------
          cp -r "$backup_dir"/* downloads/ 2>/dev/null || true

          # ---------- generate downloads/README.md ----------
          {
            echo "# Downloaded list"
            for d in downloads/*/; do
              [ -d "$d" ] || continue
              dn=$(basename "$d")
              de=$(urlencode "$dn")
              echo "- [$dn](./$de)"
            done
          } > downloads/README.md

          # ---------- update root README.md (append section) ----------
          section="فایل‌های دانلود شده"
          if [ -f README.md ]; then
            sed -i "/$section/,/^---/d" README.md
          fi
          {
            echo ""
            echo "---"
            echo "## $section"
            echo ""
            repo_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/tree/${BRANCH}/downloads"
            for d in downloads/*/; do
              [ -d "$d" ] || continue
              dn=$(basename "$d")
              de=$(urlencode "$dn")
              echo "- [$dn]($repo_url/$de)"
            done
            echo "---"
          } >> README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A downloads/ README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "AVASAM download $(date +%Y%m%d-%H%M%S)"
          for i in $(seq 1 5); do
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            if git push origin HEAD:"${GITHUB_REF_NAME}"; then
              echo "Push successful"
              exit 0
            fi
            sleep $((3 + RANDOM % 5))
          done
          echo "Push failed after retries"; exit 1
